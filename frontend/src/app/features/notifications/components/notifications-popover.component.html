<div class="popover">
  <div class="popover__header">
    <strong>Notificaciones</strong>
    <button class="btn-link" (click)="markAll()">Marcar todas</button>
  </div>

  @if (isLoading()) {
    <div class="popover__loading">
      <srx-skeleton width="100%" height="14px" />
      <srx-skeleton width="100%" height="14px" />
      <srx-skeleton width="80%" height="14px" />
    </div>
  } @else {
    @if (notifications().length === 0) {
      <div class="popover__empty">No hay notificaciones.</div>
    } @else {
      <div class="popover__list">
        @for (n of notifications().slice(0,8); track n.id) {
          <div class="notif-row" [class.unread]="!n.isRead">
            <div class="notif-main">
              <div class="notif-title">{{ n.title || 'Notificación' }}</div>
              <div class="notif-msg">{{ n.message }}</div>
            </div>
            <div class="notif-actions">
              @if (!n.isRead) {
                <button class="btn-link" (click)="markAsRead(n.id)">Marcar leída</button>
              }
            </div>
          </div>
        }
      </div>
      <div class="popover__footer">
        <a [routerLink]="['/notifications']">Ver todas</a>
      </div>
    }
  }
</div>
