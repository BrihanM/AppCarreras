$kind: http-request
url: "{{baseUrl}}/api/users/{{userId}}/vehicles"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "make": "Toyota",
      "model": "Supra",
      "plate": "ABC-123",
      "active": false
    }
scripts:
  - type: afterResponse
    code: >-
      var json = pm.response.json();

      if (json && json.id) { pm.environment.set('vehicleId', json.id); }

      pm.test('Status is 201', function () { pm.response.to.have.status(201);
      });
    language: text/javascript
order: 1000
