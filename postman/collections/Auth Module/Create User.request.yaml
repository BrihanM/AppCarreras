$kind: http-request
name: Create User
url: "{{baseUrl}}/api/users"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "name": "Brihan M",
      "local_zone": "Zona A",
      "city_area": "Medellín",
      "state_zone": "Antioquia",
      "country_zone": "Medellín",
      "rank": "A",
      "category_id": null,
      "victories": 0,
      "defeats": 0,
      "consecutive_challenges": 0,
      "state": "active",
      "account_id": "{{accountId}}"
    }
scripts:
  - type: afterResponse
    code: >-
      var json = pm.response.json();

      if (json && json.id) { pm.environment.set('userId', json.id); }

      pm.test('Status is 201', function () { pm.response.to.have.status(201);
      });
    language: text/javascript
order: 3000
